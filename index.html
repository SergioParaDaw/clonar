<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clonación Exitosa | GitHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="icon-header">
                <span class="material-icons success-icon">check_circle</span>
            </div>
            
            <h1>¡Repositorio Clonado y Modificado!</h1>
            <p class="subtitle">El repositorio se ha descargado correctamente en tu máquina local.</p>

            <div class="repo-info">
                <div class="info-row">
                    <span class="label">Repositorio:</span>
                    <span class="value">clonar</span>
                </div>
                <div class="info-row">
                    <span class="label">Ubicación:</span>
                    <code class="value">~/Documents/GitHub/clonar</code>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary">Abrir en VS Code</button>
                <button class="btn btn-secondary">Ver archivos</button>
            </div>

            <div class="footer">
                <a href="#">Volver a GitHub</a>
            </div>
        </div>
    </div>

</body>
</html>
